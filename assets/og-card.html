<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #05080a;
    font-family: 'Courier New', 'Lucida Console', monospace;
  }

  /* Faint diagonal grain, matches the page's starfield */
  .stripes {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        -55deg,
        transparent 0px,
        transparent 52px,
        rgba(95, 168, 150, 0.030) 52px,
        rgba(95, 168, 150, 0.030) 54px
      );
  }

  /* Verdigris glow behind name */
  .glow-blob {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 980px;
    height: 420px;
    background: radial-gradient(ellipse, rgba(95, 168, 150, 0.11) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
  }

  /* Top rule */
  .card::before {
    content: '';
    position: absolute;
    top: 28px; left: 60px; right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2f5b50, transparent);
  }

  /* Bottom rule */
  .card::after {
    content: '';
    position: absolute;
    bottom: 28px; left: 60px; right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2f5b50, transparent);
  }

  /* Verdigris accent bar */
  .red-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: #3f7a6c;
  }

  .lab-tag {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #3a4f4a;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .name {
    font-size: 60px;
    font-weight: 700;
    letter-spacing: 0.10em;
    color: #e2efe9;            /* cool bone */
    line-height: 1;
    margin-bottom: 22px;
    text-shadow:
      0 0 80px rgba(95, 168, 150, 0.26),
      0 0 30px rgba(95, 168, 150, 0.13);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 680px;
    margin-bottom: 22px;
  }

  .div-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #234540);
  }

  .div-line:last-child {
    background: linear-gradient(90deg, #234540, transparent);
  }

  .div-mark {
    color: #7bc0ad;
    font-size: 13px;
    letter-spacing: 0.15em;
    white-space: nowrap;
  }

  .epithet {
    font-size: 19px;
    color: #7bc0ad;
    letter-spacing: 0.06em;
    font-style: italic;
    margin-bottom: 30px;
    text-align: center;
  }

  .tags {
    display: flex;
    gap: 14px;
  }

  .tag {
    font-size: 13px;
    color: #7bc0ad;
    border: 1px solid #234540;
    padding: 4px 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(95, 168, 150, 0.05);
  }
</style>
</head>
<body>
  <div class="stripes"></div>
  <div class="red-bar"></div>
  <div class="glow-blob"></div>
  <div class="card">
    <div class="lab-tag">The Elect &middot; Voice Lab &middot; Halicarnassus</div>
    <div class="name">HERODOTUS OF HALICARNASSUS</div>
    <div class="divider">
      <span class="div-line"></span>
      <span class="div-mark">&#x25A0; HALICARNASSUS &#x25A0;</span>
      <span class="div-line"></span>
    </div>
    <div class="epithet">the Father of History, the curious traveller, in his own text</div>
    <div class="tags">
      <span class="tag">7B parameters</span>
      <span class="tag">His own words</span>
      <span class="tag">Runs locally</span>
    </div>
  </div>
</body>
</html>
